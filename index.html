<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/vite.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tauri + Vue + Typescript App</title>
  <style>
    html,
    body {
      margin: 0;
      padding: 0;
      height: 100%;
      width: 100%;
      overflow: hidden;
    }

    .app {
      display: flex;
      flex-direction: column;
      height: 100vh;
      /* Tauri 窗口默认填满，但为保证布局明确，设置 100vh */
    }

    .app .el-header {
      padding: 0;
      height: auto;
    }

    .app .el-main {
      padding: 0;
    }

    /* .editor-container {
      flex: 1;
      min-height: 0;
    } */

    .app .footer {
      padding: 0;
      height: 26px !important;
    }

    .app .footer>.title {
      font-size: 12px;
      line-height: 24px;
      border-top: 1px solid #e1e4e8;
      user-select: none;
    }


    /*====== Toolbar ======*/
    .toolbar {
      display: flex;
      background: #f0f0f0;
      padding: 4px 8px;
      border-bottom: 1px solid #ccc;
    }

    .menu {
      position: relative;
      margin-right: 16px;
      cursor: pointer;
    }

    .menu span {
      padding: 4px 8px;
      /* display: inline-block; */
    }

    .menu span:hover {
      background: #e0e0e0;
    }

    .menu-dropdown {
      position: absolute;
      top: 100%;
      left: 0;
      background: white;
      border: 1px solid #ccc;
      min-width: 120px;
      z-index: 1000;
    }

    .menu-dropdown div {
      padding: 6px 12px;
      cursor: pointer;
    }

    .menu-dropdown div:hover {
      background: #f0f0f0;
    }

    .menu-icon {
      display: inline-flex;
      align-items: center;
    }

    /*====== Explorer Style ======*/
    .title {
      font-size: 14px;
    }
    .explorer {
      height: calc(100vh - 80px);
    }

    .explorer .panel {
      padding: 0px !important;
    }

    .explorer .header {
      height: 34px !important;
    }

    .explorer .header .title {
      display: flex;
      background: #f0f0f0;
      padding: 6px 8px 7px 8px;
      border-bottom: 1px solid #ccc;
    }

    .explorer .folder {
      height: 100%;
    }

    /*====== Editor Style ======*/
    .editor {
      height: calc(100vh - 67px);
    }

    .editor .main,
    .editor .tabs,
    .editor .el-tab-pane {
      height: 100%;
    }

    .editor .el-main {
      padding: 0;
    }

    .editor .tabs .el-tabs__header {
      margin: 0;
    }

    .editor .tabs .bytemd {
      height: 100% !important;
    }

    .editor .el-header,
    .editor .el-footer {
      height: 0px;
    }

    .el-tab-pane>div {
      height: 100%;
    }

    .editor .bytemd-body {
      height: 100%;
    }
  </style>
</head>

<body>
  <div id="app"></div>
  <script type="module" src="/src/main.ts"></script>
</body>

</html>
